<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Photo Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding: 20px;
        }

        .gallery-container {
            max-width: 900px;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 2px solid #fe2c55;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .photo-card {
            background: white;
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .photo-card:hover {
            transform: scale(1.03);
        }

        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
        }

        .photo-caption {
            text-align: center;
            padding: 8px 0;
            font-size: 14px;
            color: #555;
        }

        /* Lightbox (simple preview) */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 80%;
            border-radius: 8px;
        }

        .lightbox.active {
            display: flex;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 35px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="gallery-container">
        <h2>📸 My Photo Gallery</h2>

        <div class="gallery-grid">
            <!-- Photo 1 -->
            <div class="photo-card" onclick="openLightbox('photo1.jpg')">
                <img src="Image4.jpg" alt="Photo 1">
                <div class="photo-caption">Basta maganda ako dyan</div>
            </div>

            <!-- Photo 2 -->
            <div class="photo-card" onclick="openLightbox('photo2.jpg')">
                <img src="Image5.jpg" alt="Photo 2">
                <div class="photo-caption">Grabe si tito ko nga ya</div>
            </div>

            <!-- Photo 3 -->
            <div class="photo-card" onclick="openLightbox('photo3.jpg')">
                <img src="Image6.jpg" alt="Photo 3">
                <div class="photo-caption">wow terno ta tatlo ba haha</div>
            </div>

            <!-- Photo 4 -->
            <div class="photo-card" onclick="openLightbox('photo4.jpg')">
                <img src="Image7.jpg" alt="Photo 4">
                <div class="photo-caption">Fav friend!</div>
            </div>

            <!-- Photo 5 -->
            <div class="photo-card" onclick="openLightbox('photo5.jpg')">
                <img src="Image8.jpg" alt="Photo 5">
                <div class="photo-caption">ka miss</div>
            </div>


    </script>

</body>
</html>
